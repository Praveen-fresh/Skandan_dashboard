<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skandan Enterprise — Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#1a1612;--surface:#242019;--card:#2d2820;--border:#3d3528;
  --gold:#c9a84c;--gold-soft:#e8c97a;--amber:#d4884a;
  --cream:#f0e6d0;--muted:#8a7d6a;--green:#6baa6b;--red:#c96b5a;--blue:#5a8fc9;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--cream);font-family:'Outfit',sans-serif;min-height:100vh;}

/* Header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.hdr h1{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);}
.hdr p{font-size:.7rem;color:var(--muted);margin-top:2px;letter-spacing:.05em;text-transform:uppercase;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;background:var(--muted);}
.dot.live{background:var(--green);animation:pulse 2s infinite;}
.dot.err{background:var(--red);}
.dot.load{background:var(--amber);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#stxt{font-size:.7rem;color:var(--muted);}

/* URL Bar */
.url-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.url-bar label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.url-input{flex:1;min-width:220px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--cream);font-family:'Outfit',sans-serif;font-size:.8rem;outline:none;transition:border .2s;}
.url-input:focus{border-color:var(--gold);}
.url-input::placeholder{color:var(--muted);}
.load-btn{background:var(--gold);color:#1a1612;border:none;border-radius:6px;padding:7px 18px;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap;}
.load-btn:hover{background:var(--gold-soft);}
.url-hint{font-size:.67rem;color:var(--muted);width:100%;}

/* Tabs */
.tabs{padding:12px 28px 0;display:none;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.tab{padding:7px 16px;border-radius:6px 6px 0 0;border:1px solid transparent;border-bottom:none;font-size:.78rem;font-weight:500;cursor:pointer;color:var(--muted);background:transparent;font-family:'Outfit',sans-serif;transition:all .2s;}
.tab:hover{color:var(--gold-soft);}
.tab.active{background:var(--surface);border-color:var(--border);color:var(--gold);border-bottom:1px solid var(--surface);margin-bottom:-1px;}

/* Main */
.main{padding:22px 28px;}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:13px;margin-bottom:22px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:15px 17px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi.s::before{background:var(--gold);}
.kpi.e::before{background:var(--red);}
.kpi.sl::before{background:var(--blue);}
.kpi.po::before{background:var(--amber);}
.kpi.pr::before{background:var(--green);}
.kpi-lbl{font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px;}
.kpi-val{font-family:'Playfair Display',serif;font-size:1.35rem;line-height:1;}
.kpi-sub{font-size:.66rem;color:var(--muted);margin-top:5px;}

/* Charts */
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;margin-bottom:22px;}
.cc{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:17px;}
.cc.wide{grid-column:1/-1;}
.cc-lbl{font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:13px;}

/* Table */
.tc{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:20px;}
.th{padding:13px 17px;border-bottom:1px solid var(--border);font-size:.67rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.79rem;}
thead th{background:var(--surface);padding:8px 13px;text-align:left;font-weight:600;font-size:.66rem;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:rgba(201,168,76,.04);}
tbody td{padding:8px 13px;white-space:nowrap;}
tbody td:first-child{color:var(--muted);font-size:.73rem;}
.tr{text-align:right;font-variant-numeric:tabular-nums;}
.pos{color:var(--green)!important;}
.neg{color:var(--red)!important;}
tfoot td{padding:8px 13px;font-weight:600;color:var(--gold);background:var(--surface);font-size:.77rem;text-align:right;white-space:nowrap;}
tfoot td:first-child{text-align:left;}

/* State */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:12px;color:var(--muted);}
.state .ico{font-size:2.2rem;}
.state p{font-size:.84rem;text-align:center;max-width:440px;line-height:1.6;}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error banner */
.err-bar{background:rgba(201,107,90,.1);border:1px solid var(--red);border-radius:7px;padding:10px 17px;color:var(--red);font-size:.8rem;margin:14px 28px;display:none;}

@media(max-width:600px){
  .hdr,.main,.tabs,.url-bar{padding-left:14px;padding-right:14px;}
  .kpi-val{font-size:1.15rem;}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Skandan Enterprise</h1>
    <p>CKs Bakery · Sales Dashboard</p>
  </div>
  <div style="display:flex;align-items:center">
    <span class="dot load" id="dot"></span>
    <span id="stxt">Ready</span>
  </div>
</div>

<!-- URL INPUT BAR -->
<div class="url-bar">
  <label>Sheet URL</label>
  <input class="url-input" id="sheetUrl" type="text"
    placeholder="Paste Google Sheets published URL here…"
    value="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8nsoX4Rl3L986s5kDlEerc1ckJHoZHAvQqUjwsy4sYKjZ_4m0almoPbJY3Eh3reHOxwXVU3t-IfBZ/pubhtml"/>
  <button class="load-btn" onclick="loadFromInput()">Load Data</button>
  <span class="url-hint">Paste the "Publish to web" link from File → Share → Publish to web → Web page</span>
</div>

<div id="err-bar" class="err-bar"></div>
<div class="tabs" id="tabs"></div>
<div class="main" id="main">
  <div class="state">
    <div class="ico">📊</div>
    <p>Paste your Google Sheet published URL above and click <strong style="color:var(--gold)">Load Data</strong>.</p>
  </div>
</div>

<script>
// ─── Extract sheet ID from any Google Sheets published URL ───
function extractSheetId(url) {
  url = url.trim();
  // Match /e/XXXX/ pattern (published URL)
  const pub = url.match(/\/e\/([a-zA-Z0-9_-]+)/);
  if (pub) return pub[1];
  // Match /d/XXXX/ pattern (normal edit URL)
  const doc = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (doc) return doc[1];
  // If they pasted just the ID
  if (/^[a-zA-Z0-9_-]{30,}$/.test(url)) return url;
  return null;
}

// ─── Extract GIDs from published HTML page ───
async function fetchSheetGids(sheetId) {
  // Try fetching the pubhtml page to extract sheet gids from the nav links
  return new Promise((resolve) => {
    // We use a JSONP trick: fetch gviz with sheet=0 to get the sheet list
    // Actually: parse the pubhtml to find gid values
    // Simplest: just try gids 0–20 via gviz
    resolve(null);
  });
}

let DB = {}, activeMonth = '', charts = {};
let CURRENT_SHEET_ID = '';

function loadFromInput() {
  const url = document.getElementById('sheetUrl').value;
  const id = extractSheetId(url);
  if (!id) {
    showErr('Could not read a Sheet ID from that URL. Make sure you paste the full published link.');
    return;
  }
  CURRENT_SHEET_ID = id;
  hideErr();
  init();
}

// ─── LOAD ───
async function init() {
  setDot('load','Loading…');
  DB = {};
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('main').innerHTML = '<div class="state"><div class="spin"></div><p>Fetching sheet data…</p></div>';

  // Try gids 0–19 plus some common named-sheet gids
  const gidsToTry = [];
  for (let i = 0; i < 20; i++) gidsToTry.push(i);

  const results = await Promise.allSettled(gidsToTry.map(g => fetchGviz(CURRENT_SHEET_ID, g)));

  results.forEach(r => {
    if (r.status === 'fulfilled' && r.value) {
      const { label, rows } = r.value;
      if (rows.length > 0) DB[label] = rows;
    }
  });

  if (Object.keys(DB).length === 0) {
    setDot('err','Failed');
    showErr('No data found. Make sure: (1) The sheet is published via File → Share → Publish to web → Entire Document → Web page. (2) The sheet has columns like Date, Sales, Expenses, Salary, Purchase Order.');
    document.getElementById('main').innerHTML = '<div class="state"><div class="ico">📭</div><p>No data loaded. Check the error above.</p></div>';
    return;
  }

  // Sort months chronologically
  const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const sorted = Object.keys(DB).sort((a,b)=>{
    const [ma,ya]=a.split(' '),[mb,yb]=b.split(' ');
    if (!ya || !yb) return 0;
    return ya!==yb?+ya-+yb:MO.indexOf(ma)-MO.indexOf(mb);
  });
  const ordered={};
  sorted.forEach(k=>ordered[k]=DB[k]);
  DB=ordered;
  activeMonth=sorted[sorted.length-1];

  setDot('live','Live · '+new Date().toLocaleTimeString());
  buildTabs();
  renderMonth(activeMonth);
}

// ─── JSONP fetch via Google Visualization API ───
function fetchGviz(sheetId, gid) {
  return new Promise((resolve) => {
    const cbName = '__gviz_' + gid + '_' + Date.now();
    const url = `https://docs.google.com/spreadsheets/d/e/${sheetId}/gviz/tq?tqx=out:json&tq=select+*&gid=${gid}&cb=${cbName}`;

    const timer = setTimeout(() => { cleanup(); resolve(null); }, 12000);

    window[cbName] = function(data) {
      cleanup();
      try { resolve(parseGviz(data, gid)); }
      catch(e) { resolve(null); }
    };

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    const script = document.createElement('script');
    script.onerror = () => { cleanup(); resolve(null); };
    script.src = url;
    document.head.appendChild(script);
  });
}

// ─── Parse Google Visualization DataTable ───
function parseGviz(data, gid) {
  if (!data || !data.table) return null;
  const { cols, rows } = data.table;
  if (!cols || !rows || rows.length === 0) return null;

  const headers = cols.map(c => (c.label || c.id || '').toLowerCase().trim());
  let col = { date:-1, sales:-1, expense:-1, salary:-1, po:-1 };

  headers.forEach((h, i) => {
    if (col.date < 0 && (h.includes('date') || h === 'day' || h.includes('sl') || h === 'no' || h === 's.no' || h === 'sl.no' || h === 'sl no')) col.date = i;
    if (col.sales < 0 && (h.includes('sale') || h.includes('revenue') || h.includes('income') || h.includes('cash') || h === 'total')) col.sales = i;
    if (col.expense < 0 && (h.includes('expense') || h.includes('exp')) && !h.includes('salar')) col.expense = i;
    if (col.salary < 0 && (h.includes('salar') || h.includes('staff') || h.includes('wage'))) col.salary = i;
    if (col.po < 0 && (h.includes('purchase') || h === 'po' || h.includes('p.o') || h.includes('material') || h.includes('stock') || h.includes('order'))) col.po = i;
  });

  // Fallback: scan first few rows for header row
  if (col.date < 0) {
    for (let ri = 0; ri < Math.min(rows.length, 8); ri++) {
      const cells = (rows[ri].c || []).map(c => c ? String(c.v || c.f || '').toLowerCase() : '');
      const di = cells.findIndex(c => c.includes('date') || c === 'day' || c.startsWith('sl'));
      if (di >= 0) {
        col.date = di;
        cells.forEach((c, i) => {
          if (i === di) return;
          if (col.sales < 0 && (c.includes('sale') || c.includes('revenue') || c.includes('total'))) col.sales = i;
          if (col.expense < 0 && c.includes('expense') && !c.includes('sal')) col.expense = i;
          if (col.salary < 0 && (c.includes('salar') || c.includes('staff'))) col.salary = i;
          if (col.po < 0 && (c.includes('purchase') || c === 'po' || c.includes('material') || c.includes('order'))) col.po = i;
        });
        rows.splice(ri, 1);
        break;
      }
    }
  }

  // Positional fallback
  if (col.date < 0 && cols.length >= 2) {
    col = { date:0, sales:1, expense: cols.length>2?2:-1, salary: cols.length>3?3:-1, po: cols.length>4?4:-1 };
  }

  const label = detectLabel(rows, cols, gid);

  const parsed = [];
  for (const row of rows) {
    const c = row.c || [];
    const getV = (idx) => {
      if (idx < 0 || idx >= c.length || !c[idx]) return null;
      return c[idx].v != null ? c[idx].v : (c[idx].f || null);
    };

    const dv = getV(col.date);
    if (dv == null) continue;
    const ds = String(dv).trim();
    if (!ds || /total|sum|grand|avg|average/i.test(ds)) continue;

    const sales    = pn(getV(col.sales));
    const expenses = pn(getV(col.expense));
    const salary   = pn(getV(col.salary));
    const po       = pn(getV(col.po));

    if (sales === 0 && expenses === 0 && salary === 0 && po === 0 && !isDateLike(ds)) continue;

    parsed.push({ date: fmtDate(ds), sales, expenses, salary, po });
  }

  if (parsed.length === 0) return null;
  return { label, rows: parsed };
}

function detectLabel(rows, cols, gid) {
  const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  for (const col of cols) {
    const t = (col.label || '').toLowerCase();
    const m = months.find(x => t.includes(x));
    if (m) {
      const yr = (col.label.match(/\d{4}/) || [new Date().getFullYear()])[0];
      return cap(m) + ' ' + yr;
    }
  }
  for (let ri = 0; ri < Math.min(rows.length, 5); ri++) {
    for (const cell of (rows[ri].c || [])) {
      const v = cell ? String(cell.v || cell.f || '') : '';
      const lo = v.toLowerCase();
      const m = months.find(x => lo.includes(x));
      if (m) {
        const yr = (v.match(/\d{4}/) || [new Date().getFullYear()])[0];
        return cap(m) + ' ' + yr;
      }
    }
  }
  // Fallback: try to use the sheet name from the gviz response
  // Use gid offset from current date
  const d = new Date();
  d.setMonth(d.getMonth() - gid);
  return d.toLocaleString('default',{month:'long',year:'numeric'});
}

function cap(s){ return s[0].toUpperCase()+s.slice(1); }

function pn(v) {
  if (v == null) return 0;
  const n = parseFloat(String(v).replace(/[₹,\s]/g,''));
  return isNaN(n) ? 0 : n;
}

function isDateLike(s) {
  return /\d{1,2}[-\/]\d{1,2}/.test(s) || /^\d{1,2}$/.test(s.trim());
}

function fmtDate(s) {
  s = String(s).trim();
  const gd = s.match(/^Date\((\d+),(\d+),(\d+)\)$/);
  if (gd) return `${String(+gd[3]).padStart(2,'0')}/${String(+gd[2]+1).padStart(2,'0')}/${gd[1]}`;
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[3]}/${iso[2]}/${iso[1]}`;
  const dmy = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);
  if (dmy) return `${dmy[1].padStart(2,'0')}/${dmy[2].padStart(2,'0')}/${dmy[3].length===2?'20'+dmy[3]:dmy[3]}`;
  return s;
}

// ─── UI ───
function buildTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML=''; el.style.display='flex';
  Object.keys(DB).forEach(m => {
    const b = document.createElement('button');
    b.className = 'tab'+(m===activeMonth?' active':'');
    b.textContent = m;
    b.onclick = () => { activeMonth=m; buildTabs(); renderMonth(m); };
    el.appendChild(b);
  });
}

function renderMonth(month) {
  const rows = DB[month];
  Object.values(charts).forEach(c=>c.destroy()); charts={};

  const tS   = rows.reduce((a,r)=>a+r.sales,0);
  const tE   = rows.reduce((a,r)=>a+r.expenses,0);
  const tSal = rows.reduce((a,r)=>a+r.salary,0);
  const tPO  = rows.reduce((a,r)=>a+r.po,0);
  const profit = tS-tE-tSal-tPO;
  const margin = tS>0?((profit/tS)*100).toFixed(1):0;
  const activeDays = rows.filter(r=>r.sales>0).length;

  document.getElementById('main').innerHTML = `
  <div class="kpi-grid">
    <div class="kpi s"><div class="kpi-lbl">Total Sales</div><div class="kpi-val">₹${F(tS)}</div><div class="kpi-sub">${activeDays} active days</div></div>
    <div class="kpi e"><div class="kpi-lbl">Expenses</div><div class="kpi-val">₹${F(tE)}</div><div class="kpi-sub">${tS?pc(tE,tS):0}% of sales</div></div>
    <div class="kpi sl"><div class="kpi-lbl">Salary</div><div class="kpi-val">₹${F(tSal)}</div><div class="kpi-sub">${tS?pc(tSal,tS):0}% of sales</div></div>
    <div class="kpi po"><div class="kpi-lbl">Purchase Orders</div><div class="kpi-val">₹${F(tPO)}</div><div class="kpi-sub">${tS?pc(tPO,tS):0}% of sales</div></div>
    <div class="kpi pr"><div class="kpi-lbl">Net Profit</div>
      <div class="kpi-val" style="color:${profit>=0?'var(--green)':'var(--red)'}">₹${F(profit)}</div>
      <div class="kpi-sub" style="color:${profit>=0?'var(--green)':'var(--red)'};font-weight:600">${margin}% margin</div>
    </div>
  </div>

  <div class="charts">
    <div class="cc wide"><div class="cc-lbl">Daily Sales vs Costs</div><div style="position:relative;height:250px"><canvas id="cBar"></canvas></div></div>
    <div class="cc"><div class="cc-lbl">Sales Trend</div><div style="position:relative;height:210px"><canvas id="cLine"></canvas></div></div>
    <div class="cc"><div class="cc-lbl">Cost Breakdown</div><div style="position:relative;height:210px"><canvas id="cPie"></canvas></div></div>
  </div>

  <div class="tc">
    <div class="th">Daily Entries — ${month}</div>
    <div class="tw">
      <table>
        <thead><tr>
          <th>Date</th>
          <th style="text-align:right">Sales ₹</th>
          <th style="text-align:right">Expenses ₹</th>
          <th style="text-align:right">Salary ₹</th>
          <th style="text-align:right">PO ₹</th>
          <th style="text-align:right">Net ₹</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
        <tfoot><tr>
          <td>TOTAL</td>
          <td>₹${F(tS)}</td><td>₹${F(tE)}</td><td>₹${F(tSal)}</td><td>₹${F(tPO)}</td>
          <td style="color:${profit>=0?'var(--green)':'var(--red)'}">₹${F(profit)}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>`;

  const tb = document.getElementById('tbody');
  rows.forEach(r => {
    const net = r.sales-r.expenses-r.salary-r.po;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.date}</td>
      <td class="tr">${r.sales?F(r.sales):'—'}</td>
      <td class="tr">${r.expenses?F(r.expenses):'—'}</td>
      <td class="tr">${r.salary?F(r.salary):'—'}</td>
      <td class="tr">${r.po?F(r.po):'—'}</td>
      <td class="tr ${r.sales?(net>=0?'pos':'neg'):''}">${r.sales?F(net):'—'}</td>`;
    tb.appendChild(tr);
  });

  requestAnimationFrame(()=>drawCharts(rows,tS,tE,tSal,tPO,profit));
}

function drawCharts(rows,tS,tE,tSal,tPO,profit) {
  const labels = rows.map(r=>r.date.split('/')[0]);
  const tk={color:'#8a7d6a',font:{family:'Outfit',size:10}};
  const gr={color:'rgba(61,53,40,.7)'};
  const lg={labels:{color:'#8a7d6a',font:{family:'Outfit',size:10},boxWidth:10}};

  charts.bar=new Chart(document.getElementById('cBar'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Sales',    data:rows.map(r=>r.sales),    backgroundColor:'rgba(201,168,76,.8)',borderRadius:3},
      {label:'Expenses', data:rows.map(r=>r.expenses), backgroundColor:'rgba(201,107,90,.7)',borderRadius:3},
      {label:'Salary',   data:rows.map(r=>r.salary),   backgroundColor:'rgba(90,143,201,.6)',borderRadius:3},
      {label:'PO',       data:rows.map(r=>r.po),       backgroundColor:'rgba(212,136,74,.6)',borderRadius:3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{...lg,position:'top'}},
      scales:{x:{ticks:tk,grid:gr},y:{ticks:{...tk,callback:v=>'₹'+F(v)},grid:gr}}}
  });

  let cum=0,cumD=rows.map(r=>{cum+=r.sales;return cum;});
  charts.line=new Chart(document.getElementById('cLine'),{
    type:'line',
    data:{labels,datasets:[
      {label:'Daily Sales',data:rows.map(r=>r.sales),
        borderColor:'#c9a84c',backgroundColor:'rgba(201,168,76,.1)',
        borderWidth:2,pointRadius:3,fill:true,tension:.35},
      {label:'Cumulative',data:cumD,
        borderColor:'#6baa6b',backgroundColor:'transparent',
        borderWidth:1.5,pointRadius:0,borderDash:[4,3],tension:.35,yAxisID:'y2'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:lg},
      scales:{
        x:{ticks:tk,grid:gr},
        y:{ticks:{...tk,callback:v=>'₹'+F(v)},grid:gr},
        y2:{position:'right',ticks:{...tk,color:'#6baa6b',callback:v=>'₹'+F(v)},grid:{drawOnChartArea:false}}
      }}
  });

  charts.pie=new Chart(document.getElementById('cPie'),{
    type:'doughnut',
    data:{
      labels:['Expenses','Salary','Purchase Orders','Net Profit'],
      datasets:[{
        data:[tE,tSal,tPO,Math.max(0,profit)],
        backgroundColor:['rgba(201,107,90,.8)','rgba(90,143,201,.8)','rgba(212,136,74,.8)','rgba(107,170,107,.8)'],
        borderColor:'#2d2820',borderWidth:2
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{
        legend:{position:'bottom',labels:{color:'#8a7d6a',font:{family:'Outfit',size:10},boxWidth:10,padding:10}},
        tooltip:{callbacks:{label:ctx=>{
          const pct=tS>0?((ctx.parsed/tS)*100).toFixed(1):0;
          return ` ₹${F(ctx.parsed)} (${pct}%)`;
        }}}
      }}
  });
}

// Helpers
function F(n){return Math.round(n||0).toLocaleString('en-IN');}
function pc(a,b){return b>0?((a/b)*100).toFixed(1):0;}
function setDot(cls,txt){
  document.getElementById('dot').className='dot '+cls;
  document.getElementById('stxt').textContent=txt;
}
function showErr(msg){const e=document.getElementById('err-bar');e.textContent='⚠ '+msg;e.style.display='block';}
function hideErr(){const e=document.getElementById('err-bar');e.style.display='none';}

// Auto-load on page open if URL field has value
window.onload = () => {
  const url = document.getElementById('sheetUrl').value.trim();
  if (url) loadFromInput();
};
</script>
</body>

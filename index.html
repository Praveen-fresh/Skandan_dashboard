<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skandan Enterprise — Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #1a1612;
    --surface:   #242019;
    --card:      #2d2820;
    --border:    #3d3528;
    --gold:      #c9a84c;
    --gold-soft: #e8c97a;
    --amber:     #d4884a;
    --cream:     #f0e6d0;
    --muted:     #8a7d6a;
    --green:     #6baa6b;
    --red:       #c96b5a;
    --blue:      #5a8fc9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-brand h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .header-brand p {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.4; }
  }

  /* ── Sheet Config ── */
  .config-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .config-bar label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .config-bar input {
    flex: 1;
    min-width: 280px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--cream);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
  }
  .config-bar input:focus { outline: none; border-color: var(--gold); }
  .btn-load {
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .btn-load:hover { background: var(--gold-soft); }

  /* ── Month Tabs ── */
  .tabs-bar {
    padding: 16px 32px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 8px 18px;
    border-radius: 6px 6px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    background: transparent;
    font-family: 'Outfit', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .tab:hover { color: var(--gold-soft); }
  .tab.active {
    background: var(--surface);
    border-color: var(--border);
    color: var(--gold);
    border-bottom: 1px solid var(--surface);
    margin-bottom: -1px;
  }

  /* ── Main ── */
  .main { padding: 28px 32px; }

  /* ── KPI Cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .kpi-card.sales::before   { background: var(--gold); }
  .kpi-card.expense::before { background: var(--red); }
  .kpi-card.salary::before  { background: var(--blue); }
  .kpi-card.po::before      { background: var(--amber); }
  .kpi-card.profit::before  { background: var(--green); }

  .kpi-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .kpi-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--cream);
    line-height: 1;
  }
  .kpi-sub {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .kpi-trend { font-weight: 600; }
  .kpi-trend.up   { color: var(--green); }
  .kpi-trend.down { color: var(--red); }

  /* ── Charts Grid ── */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .chart-wrap { position: relative; }

  /* ── Data Table ── */
  .table-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  thead th {
    background: var(--surface);
    padding: 10px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: rgba(201,168,76,0.05); }
  tbody td {
    padding: 10px 16px;
    color: var(--cream);
    white-space: nowrap;
  }
  tbody td:first-child { color: var(--muted); font-size: 0.78rem; }
  .td-num { text-align: right; font-variant-numeric: tabular-nums; }
  .td-pos { color: var(--green) !important; }
  .td-neg { color: var(--red) !important; }
  tfoot td {
    padding: 10px 16px;
    font-weight: 600;
    color: var(--gold);
    background: var(--surface);
    font-size: 0.8rem;
    text-align: right;
    white-space: nowrap;
  }
  tfoot td:first-child { text-align: left; }

  /* ── State screens ── */
  .state-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    gap: 12px;
    color: var(--muted);
  }
  .state-screen .icon { font-size: 2.5rem; }
  .state-screen p { font-size: 0.9rem; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(201,107,90,0.12);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 14px 20px;
    color: var(--red);
    font-size: 0.85rem;
    margin: 20px 32px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header, .config-bar, .main, .tabs-bar { padding-left: 16px; padding-right: 16px; }
    .kpi-value { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-brand">
    <h1>Skandan Enterprise</h1>
    <p>CKs Bakery · Sales Dashboard</p>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span id="last-updated">Not loaded</span>
  </div>
</div>

<!-- Sheet URL Input -->
<div class="config-bar">
  <label>Google Sheet Publish URL</label>
  <input type="text" id="sheet-url" placeholder="Paste your published CSV URL here…"
    value="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8nsoX4Rl3L986s5kDlEerc1ckJHoZHAvQqUjwsy4sYKjZ_4m0almoPbJY3Eh3reHOxwXVU3t-IfBZ/pub?output=csv"/>
  <button class="btn-load" onclick="loadSheet()">Load Data</button>
</div>

<!-- Error -->
<div id="error-box" class="error-msg" style="display:none;"></div>

<!-- Month Tabs -->
<div class="tabs-bar" id="tabs-bar" style="display:none;"></div>

<!-- Main Content -->
<div class="main" id="main-content">
  <div class="state-screen">
    <div class="icon">📊</div>
    <p>Paste your Google Sheet published CSV URL above and click <strong>Load Data</strong></p>
    <p style="font-size:0.78rem;">File → Share → Publish to web → CSV → Copy URL</p>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────
let allMonthsData = {};   // { "June 2026": [ {date, sales, expenses, salary, po}, ... ] }
let activeMonth   = null;
let chartInstances = {};

// ─── Load Sheet ──────────────────────────────────────────────
async function loadSheet() {
  const url = document.getElementById('sheet-url').value.trim();
  if (!url) return showError('Please paste a Google Sheets published CSV URL.');

  setError(null);
  showLoading();

  // Build base (strip any existing params except output=csv)
  let baseUrl = url.split('?')[0];
  // Ensure it ends with /pub
  if (!baseUrl.includes('/pub')) {
    // Try to convert edit URL to pub URL (fallback)
    baseUrl = baseUrl.replace('/edit', '/pub');
  }

  // Fetch sheet list via gid=0 first, then we'll try to detect tabs
  // Google Sheets "Publish to web" with output=csv only gives one sheet at a time.
  // We'll try gids 0–20 to discover all sheets.
  await discoverAndLoadAllSheets(baseUrl);
}

async function discoverAndLoadAllSheets(baseUrl) {
  allMonthsData = {};
  const MAX_SHEETS = 15;

  // Try to get the HTML version to discover gids
  let gids = [];
  try {
    const htmlUrl = baseUrl.replace('?output=csv','') + '?output=html';
    // We can't rely on fetching html, so just try sequential gids 0-10
    // plus the one from the original URL if present
    const origUrl = document.getElementById('sheet-url').value;
    const gidMatch = origUrl.match(/[?&]gid=(\d+)/);
    if (gidMatch) gids.push(parseInt(gidMatch[1]));
    for (let i = 0; i <= MAX_SHEETS; i++) {
      if (!gids.includes(i)) gids.push(i); // we'll try all
    }
    // Actually try by sheet index (0,1,2...) using &single=true
  } catch(e) {}

  // Fetch gids sequentially, stop on repeated failures
  let consecutiveFails = 0;
  for (let gid = 0; gid <= MAX_SHEETS; gid++) {
    const csvUrl = `${baseUrl}?output=csv&gid=${gid}`;
    try {
      const resp = await fetch(csvUrl);
      if (!resp.ok) { consecutiveFails++; if (consecutiveFails > 3) break; continue; }
      const text = await resp.text();
      if (!text || text.trim().length < 10) { consecutiveFails++; if (consecutiveFails > 3) break; continue; }
      consecutiveFails = 0;
      const parsed = parseCSV(text, gid);
      if (parsed) {
        allMonthsData[parsed.label] = parsed.rows;
      }
    } catch(e) {
      consecutiveFails++;
      if (consecutiveFails > 3) break;
    }
  }

  if (Object.keys(allMonthsData).length === 0) {
    showError('Could not load any data. Make sure the sheet is published to web as CSV (File → Share → Publish to web → CSV).');
    showEmptyState();
    return;
  }

  // Sort months chronologically
  const monthOrder = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const sorted = Object.keys(allMonthsData).sort((a, b) => {
    const [mA, yA] = a.split(' '); const [mB, yB] = b.split(' ');
    if (yA !== yB) return parseInt(yA) - parseInt(yB);
    return monthOrder.indexOf(mA) - monthOrder.indexOf(mB);
  });

  const reordered = {};
  sorted.forEach(k => reordered[k] = allMonthsData[k]);
  allMonthsData = reordered;

  activeMonth = sorted[sorted.length - 1]; // latest month
  document.getElementById('last-updated').textContent = 'Loaded · ' + new Date().toLocaleTimeString();

  buildTabs();
  renderMonth(activeMonth);
}

// ─── CSV Parser ──────────────────────────────────────────────
function parseCSV(text, gid) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  if (lines.length < 2) return null;

  // Parse all rows
  const rows2d = lines.map(l => splitCSVLine(l));

  // Try to detect sheet label (month name) from first row or cell A1
  let sheetLabel = detectSheetLabel(rows2d, gid);

  // Find the data rows: look for a row with "Date" / "Day" header or numeric first column
  let headerIdx = -1;
  let colMap = {};

  for (let i = 0; i < Math.min(rows2d.length, 10); i++) {
    const row = rows2d[i].map(c => c.toLowerCase().trim());
    // Look for date/day column
    if (row.some(c => c.includes('date') || c === 'day' || c === 'sl' || c === 'sl.no')) {
      headerIdx = i;
      // Map columns
      row.forEach((cell, idx) => {
        if (cell.includes('date') || cell === 'day' || cell === 'sl' || cell === 'sl.no') colMap.date = idx;
        else if (cell.includes('sale') || cell.includes('revenue') || cell.includes('income') || cell.includes('total sale')) colMap.sales = idx;
        else if (cell.includes('expense') && !cell.includes('salary')) colMap.expenses = idx;
        else if (cell.includes('salary') || cell.includes('staff')) colMap.salary = idx;
        else if (cell.includes('purchase') || cell.includes(' po') || cell === 'po' || cell.includes('purchase order') || cell.includes('material')) colMap.po = idx;
        else if (cell.includes('remark') || cell.includes('note')) colMap.remark = idx;
        else if (cell.includes('cash') || cell.includes('credit') || cell.includes('upi') || cell.includes('online')) {
          if (!colMap.sales) colMap.sales = idx; // treat first payment col as sales fallback
        }
      });
      break;
    }
  }

  // If no explicit header found, try to infer from first row values
  if (headerIdx === -1) {
    // Check if first col looks like dates or numbers (day numbers)
    for (let i = 0; i < rows2d.length; i++) {
      const first = rows2d[i][0];
      if (first && (isDateLike(first) || /^\d{1,2}$/.test(first.trim()))) {
        headerIdx = i - 1;
        // Guess columns: col0=date, col1=sales, col2=expenses, col3=salary, col4=po
        colMap = { date: 0, sales: 1, expenses: 2, salary: 3, po: 4 };
        break;
      }
    }
    if (headerIdx === -1) return null;
  }

  // Collect data rows
  const dataRows = [];
  for (let i = headerIdx + 1; i < rows2d.length; i++) {
    const row = rows2d[i];
    if (!row || row.length === 0) continue;
    const dateVal = row[colMap.date ?? 0];
    if (!dateVal || dateVal.trim() === '') continue;
    // Skip totals/summary rows
    const lower = dateVal.toLowerCase().trim();
    if (lower.includes('total') || lower.includes('sum') || lower.includes('grand') || lower === '') continue;

    const sales    = parseNum(row[colMap.sales]);
    const expenses = parseNum(row[colMap.expenses]);
    const salary   = parseNum(row[colMap.salary]);
    const po       = parseNum(row[colMap.po]);

    dataRows.push({
      date: formatDate(dateVal),
      sales,
      expenses,
      salary,
      po,
      remark: colMap.remark != null ? (row[colMap.remark] || '') : ''
    });
  }

  if (dataRows.length === 0) return null;

  return { label: sheetLabel, rows: dataRows };
}

function detectSheetLabel(rows2d, gid) {
  // Look in first 3 rows for something that looks like "Month Year" or "June 2026"
  const monthNames = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  for (let i = 0; i < Math.min(3, rows2d.length); i++) {
    for (const cell of rows2d[i]) {
      if (!cell) continue;
      const lower = cell.toLowerCase();
      const found = monthNames.find(m => lower.includes(m));
      if (found) {
        const yearMatch = cell.match(/\d{4}/);
        const year = yearMatch ? yearMatch[0] : new Date().getFullYear();
        return found.charAt(0).toUpperCase() + found.slice(1) + ' ' + year;
      }
    }
  }
  // Fallback: name by gid
  const now = new Date();
  const m = new Date(now.getFullYear(), now.getMonth() - gid, 1);
  return m.toLocaleString('default', { month: 'long', year: 'numeric' });
}

function splitCSVLine(line) {
  const result = [];
  let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseNum(val) {
  if (val == null) return 0;
  const n = parseFloat(String(val).replace(/[₹,\s]/g, ''));
  return isNaN(n) ? 0 : n;
}

function isDateLike(s) {
  return /\d{1,2}[-\/]\d{1,2}/.test(s) || /\d{4}/.test(s);
}

function formatDate(s) {
  if (!s) return '';
  s = s.trim();
  // If already like "01-06-2026" or "1/6/2026"
  const m = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);
  if (m) {
    const d = m[1].padStart(2,'0'), mo = m[2].padStart(2,'0'), y = m[3].length===2?'20'+m[3]:m[3];
    return `${d}/${mo}/${y}`;
  }
  return s;
}

// ─── Tabs ────────────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  bar.style.display = 'flex';
  Object.keys(allMonthsData).forEach(month => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (month === activeMonth ? ' active' : '');
    btn.textContent = month;
    btn.onclick = () => { activeMonth = month; buildTabs(); renderMonth(month); };
    bar.appendChild(btn);
  });
}

// ─── Render Month ────────────────────────────────────────────
function renderMonth(month) {
  const rows = allMonthsData[month];
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  // Destroy old charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  // KPIs
  const totSales    = rows.reduce((s,r) => s + r.sales, 0);
  const totExpenses = rows.reduce((s,r) => s + r.expenses, 0);
  const totSalary   = rows.reduce((s,r) => s + r.salary, 0);
  const totPO       = rows.reduce((s,r) => s + r.po, 0);
  const totCost     = totExpenses + totSalary + totPO;
  const profit      = totSales - totCost;
  const margin      = totSales > 0 ? ((profit / totSales) * 100).toFixed(1) : 0;
  const avgDaily    = rows.filter(r => r.sales > 0).length;

  main.innerHTML = `
    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card sales">
        <div class="kpi-label">Total Sales</div>
        <div class="kpi-value">₹${fmt(totSales)}</div>
        <div class="kpi-sub">${avgDaily} active days</div>
      </div>
      <div class="kpi-card expense">
        <div class="kpi-label">Expenses</div>
        <div class="kpi-value">₹${fmt(totExpenses)}</div>
        <div class="kpi-sub">${totSales > 0 ? ((totExpenses/totSales)*100).toFixed(1) : 0}% of sales</div>
      </div>
      <div class="kpi-card salary">
        <div class="kpi-label">Salary</div>
        <div class="kpi-value">₹${fmt(totSalary)}</div>
        <div class="kpi-sub">${totSales > 0 ? ((totSalary/totSales)*100).toFixed(1) : 0}% of sales</div>
      </div>
      <div class="kpi-card po">
        <div class="kpi-label">Purchase Orders</div>
        <div class="kpi-value">₹${fmt(totPO)}</div>
        <div class="kpi-sub">${totSales > 0 ? ((totPO/totSales)*100).toFixed(1) : 0}% of sales</div>
      </div>
      <div class="kpi-card profit">
        <div class="kpi-label">Net Profit</div>
        <div class="kpi-value" style="color:${profit>=0?'var(--green)':'var(--red)'}">₹${fmt(profit)}</div>
        <div class="kpi-sub kpi-trend ${profit>=0?'up':'down'}">${margin}% margin</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card wide">
        <div class="chart-title">Daily Sales vs Expenses</div>
        <div class="chart-wrap" style="height:260px">
          <canvas id="barChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Sales Trend</div>
        <div class="chart-wrap" style="height:220px">
          <canvas id="lineChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Cost Breakdown</div>
        <div class="chart-wrap" style="height:220px">
          <canvas id="pieChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-header">Daily Entries — ${month}</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th style="text-align:right">Sales (₹)</th>
              <th style="text-align:right">Expenses (₹)</th>
              <th style="text-align:right">Salary (₹)</th>
              <th style="text-align:right">PO (₹)</th>
              <th style="text-align:right">Net (₹)</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
          <tfoot>
            <tr>
              <td>TOTAL</td>
              <td>₹${fmt(totSales)}</td>
              <td>₹${fmt(totExpenses)}</td>
              <td>₹${fmt(totSalary)}</td>
              <td>₹${fmt(totPO)}</td>
              <td style="color:${profit>=0?'var(--green)':'var(--red)'}">₹${fmt(profit)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  `;

  // Fill table
  const tbody = document.getElementById('table-body');
  rows.forEach(r => {
    const net = r.sales - r.expenses - r.salary - r.po;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.date}</td>
      <td class="td-num">${r.sales ? fmt(r.sales) : '—'}</td>
      <td class="td-num">${r.expenses ? fmt(r.expenses) : '—'}</td>
      <td class="td-num">${r.salary ? fmt(r.salary) : '—'}</td>
      <td class="td-num">${r.po ? fmt(r.po) : '—'}</td>
      <td class="td-num ${net >= 0 ? 'td-pos' : 'td-neg'}">${r.sales ? fmt(net) : '—'}</td>
    `;
    tbody.appendChild(tr);
  });

  // Draw charts after DOM paint
  requestAnimationFrame(() => drawCharts(rows));
}

function drawCharts(rows) {
  const labels   = rows.map(r => r.date.split('/')[0]); // day number
  const sales    = rows.map(r => r.sales);
  const expenses = rows.map(r => r.expenses);
  const salary   = rows.map(r => r.salary);
  const po       = rows.map(r => r.po);

  const defaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#8a7d6a', font: { family: 'Outfit', size: 11 }, boxWidth: 12 } } },
    scales: {
      x: { ticks: { color: '#8a7d6a', font: { size: 10 } }, grid: { color: 'rgba(61,53,40,0.6)' } },
      y: { ticks: { color: '#8a7d6a', font: { size: 10 }, callback: v => '₹'+fmt(v) }, grid: { color: 'rgba(61,53,40,0.6)' } }
    }
  };

  // Bar Chart
  chartInstances.bar = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Sales',    data: sales,    backgroundColor: 'rgba(201,168,76,0.75)', borderRadius: 3 },
        { label: 'Expenses', data: expenses, backgroundColor: 'rgba(201,107,90,0.65)', borderRadius: 3 },
        { label: 'Salary',   data: salary,   backgroundColor: 'rgba(90,143,201,0.55)', borderRadius: 3 },
        { label: 'PO',       data: po,       backgroundColor: 'rgba(212,136,74,0.55)', borderRadius: 3 },
      ]
    },
    options: { ...defaults, plugins: { ...defaults.plugins, legend: { ...defaults.plugins.legend, position: 'top' } } }
  });

  // Line Chart
  const cumulativeSales = [];
  let cum = 0;
  sales.forEach(v => { cum += v; cumulativeSales.push(cum); });

  chartInstances.line = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Daily Sales', data: sales,
          borderColor: '#c9a84c', backgroundColor: 'rgba(201,168,76,0.12)',
          borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#c9a84c', fill: true, tension: 0.35
        },
        {
          label: 'Cumulative', data: cumulativeSales,
          borderColor: '#6baa6b', backgroundColor: 'transparent',
          borderWidth: 1.5, pointRadius: 0, borderDash: [4,3], tension: 0.35, yAxisID: 'y2'
        }
      ]
    },
    options: {
      ...defaults,
      scales: {
        ...defaults.scales,
        y2: { position: 'right', ticks: { color: '#6baa6b', font: { size: 9 }, callback: v => '₹'+fmt(v) }, grid: { drawOnChartArea: false } }
      }
    }
  });

  // Pie Chart
  const totE = expenses.reduce((a,b)=>a+b,0);
  const totS = salary.reduce((a,b)=>a+b,0);
  const totP = po.reduce((a,b)=>a+b,0);
  const totSales2 = sales.reduce((a,b)=>a+b,0);
  const netProfit = Math.max(0, totSales2 - totE - totS - totP);

  chartInstances.pie = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: ['Expenses','Salary','Purchase Orders','Net Profit'],
      datasets: [{
        data: [totE, totS, totP, netProfit],
        backgroundColor: ['rgba(201,107,90,0.8)','rgba(90,143,201,0.8)','rgba(212,136,74,0.8)','rgba(107,170,107,0.8)'],
        borderColor: '#2d2820', borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#8a7d6a', font: { family: 'Outfit', size: 10 }, boxWidth: 10, padding: 12 } },
        tooltip: { callbacks: { label: ctx => ` ₹${fmt(ctx.parsed)} (${totSales2>0?((ctx.parsed/totSales2)*100).toFixed(1):0}%)` } }
      }
    }
  });
}

// ─── Helpers ─────────────────────────────────────────────────
function fmt(n) {
  if (n == null || isNaN(n)) return '0';
  return Math.round(n).toLocaleString('en-IN');
}

function showLoading() {
  document.getElementById('main-content').innerHTML = `
    <div class="state-screen">
      <div class="spinner"></div>
      <p>Fetching your sheet data…</p>
    </div>`;
}
function showEmptyState() {
  document.getElementById('main-content').innerHTML = `
    <div class="state-screen">
      <div class="icon">📭</div>
      <p>No data found. Check your URL and sheet structure.</p>
    </div>`;
}
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠ ' + msg;
  el.style.display = msg ? 'block' : 'none';
}
function setError(msg) { showError(msg || ''); }

// ─── Auto-load on page open ───────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const url = document.getElementById('sheet-url').value.trim();
  if (url) loadSheet();
});
</script>
</body>
</html>

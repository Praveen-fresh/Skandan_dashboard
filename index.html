<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skandan Enterprise — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#1a1612;--surface:#242019;--card:#2d2820;--border:#3d3528;
  --gold:#c9a84c;--gold-soft:#e8c97a;
  --cream:#f0e6d0;--muted:#8a7d6a;--green:#6baa6b;--red:#c96b5a;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--cream);font-family:'Outfit',sans-serif;min-height:100vh;}

.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.hdr-left h1{font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--gold);}
.hdr-left p{font-size:.68rem;color:var(--muted);margin-top:3px;letter-spacing:.07em;text-transform:uppercase;}
.badge{background:rgba(201,168,76,.1);border:1px solid var(--gold);color:var(--gold);font-size:.65rem;padding:4px 10px;border-radius:20px;letter-spacing:.05em;}
.badge.live{background:rgba(107,170,107,.15);border-color:var(--green);color:var(--green);}

.loader-panel{padding:28px;max-width:780px;margin:0 auto;}
.loader-panel h2{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--gold);margin-bottom:6px;}
.loader-panel p{font-size:.8rem;color:var(--muted);margin-bottom:18px;line-height:1.6;}
.input-row{display:flex;gap:10px;flex-wrap:wrap;}
.input-row input{flex:1;min-width:220px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--cream);font-family:'Outfit',sans-serif;font-size:.85rem;outline:none;transition:border .2s;}
.input-row input:focus{border-color:var(--gold);}
.input-row input::placeholder{color:var(--muted);}
.btn{background:var(--gold);color:#1a1612;border:none;border-radius:8px;padding:10px 22px;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.hint{font-size:.72rem;color:var(--muted);margin-top:10px;line-height:1.55;}
.err-msg{margin-top:12px;padding:10px 14px;background:rgba(201,107,90,.15);border:1px solid var(--red);border-radius:8px;font-size:.8rem;color:var(--red);display:none;}

.main{padding:22px 28px;display:none;}
.tc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.th{padding:13px 18px;border-bottom:1px solid var(--border);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.79rem;}
thead th{background:var(--surface);padding:9px 13px;text-align:left;font-weight:600;font-size:.64rem;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(201,168,76,.04);}
tbody td{padding:8px 13px;white-space:nowrap;color:var(--cream);}
.reset-wrap{text-align:center;margin-top:16px;}
.btn-reset{background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:.75rem;padding:7px 16px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;}
.btn-reset:hover{border-color:var(--gold);color:var(--gold);}

@media(max-width:600px){.main,.loader-panel{padding:14px;}.hdr{padding:14px;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <h1>Skandan Enterprise</h1>
    <p>Sales &amp; Cash Ledger Dashboard</p>
  </div>
  <span class="badge" id="badge">● Awaiting Data</span>
</div>

<div class="loader-panel" id="loaderPanel">
  <h2>Load Your Sheet Data</h2>
  <p>Paste your Google Sheets "Publish to web" CSV link below, then click <strong>Load Data</strong>.</p>
  <div class="input-row">
    <input id="sheetUrl" type="url" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv"/>
    <button class="btn" id="loadBtn">Load Data</button>
  </div>
  <div class="hint">
    To get the CSV URL: <strong>File → Share → Publish to web → CSV → Publish</strong>, then copy the link.
  </div>
  <div class="err-msg" id="errMsg"></div>
</div>

<div class="main" id="mainPanel">
  <div class="tc">
    <div class="th">
      <span>Sheet Data</span>
      <span id="rowCount" style="color:var(--muted);font-size:.7rem"></span>
    </div>
    <div class="tw">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="reset-wrap">
    <button class="btn-reset" id="resetBtn">← Load Different Sheet</button>
  </div>
</div>

<script>
function parseCSV(text){
  const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim().length>0);
  const parseLine = line => {
    const cols=[]; let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){
        if(inQ && line[i+1]==='"'){cur+='"';i++;}
        else inQ=!inQ;
      } else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  };
  const headers = parseLine(lines[0]);
  const rows = lines.slice(1).map(parseLine);
  return {headers, rows};
}

async function loadSheet(){
  const btn = document.getElementById('loadBtn');
  const err = document.getElementById('errMsg');
  let url = document.getElementById('sheetUrl').value.trim();
  err.style.display='none';

  if(!url){ showErr('Please paste a Google Sheets CSV link.'); return; }

  // Normalise URL to always have output=csv
  if(url.includes('/edit')) url = url.split('/edit')[0];
  if(url.includes('/pub') && !url.includes('output=csv'))
    url = url.split('?')[0] + '?output=csv';
  if(!url.includes('output=csv'))
    url += (url.includes('?') ? '&' : '?') + 'output=csv';

  btn.disabled=true; btn.textContent='Loading…';

  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    if(!text.trim()) throw new Error('Empty response from sheet.');
    if(text.trim().startsWith('<')) throw new Error('Sheet is not publicly published as CSV. Use File → Share → Publish to web → CSV.');

    const {headers, rows} = parseCSV(text);
    if(!headers.length) throw new Error('No headers found.');
    if(!rows.length) throw new Error('No data rows found.');

    // Render table — just show whatever columns exist
    document.getElementById('thead').innerHTML =
      '<tr>' + headers.map(h=>'<th>'+(h||'')+'</th>').join('') + '</tr>';

    const tbody = document.getElementById('tbody');
    tbody.innerHTML='';
    rows.forEach(row=>{
      const tr=document.createElement('tr');
      tr.innerHTML = headers.map((_,i)=>'<td>'+(row[i]||'')+'</td>').join('');
      tbody.appendChild(tr);
    });

    document.getElementById('rowCount').textContent = rows.length+' rows · '+headers.length+' columns';
    document.getElementById('badge').textContent='● Live Data';
    document.getElementById('badge').className='badge live';
    document.getElementById('loaderPanel').style.display='none';
    document.getElementById('mainPanel').style.display='block';

  } catch(e){
    showErr(e.message);
  }

  btn.disabled=false; btn.textContent='Load Data';
}

function showErr(msg){
  const el=document.getElementById('errMsg');
  el.textContent=msg; el.style.display='block';
}

function resetDashboard(){
  document.getElementById('loaderPanel').style.display='block';
  document.getElementById('mainPanel').style.display='none';
  document.getElementById('sheetUrl').value='';
  document.getElementById('badge').textContent='● Awaiting Data';
  document.getElementById('badge').className='badge';
  document.getElementById('errMsg').style.display='none';
  document.getElementById('thead').innerHTML='';
  document.getElementById('tbody').innerHTML='';
}

document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('loadBtn').addEventListener('click', loadSheet);
  document.getElementById('sheetUrl').addEventListener('keydown', e=>{ if(e.key==='Enter') loadSheet(); });
  document.getElementById('resetBtn').addEventListener('click', resetDashboard);
});
</script>
</body>
</html>
